<body>
<div id="root"></div>
<script type="module">
import{createElement as h,useState,useEffect,useRef}from'https://esm.sh/react@18';
import{createRoot}from'https://esm.sh/react-dom@18/client';
import{rpc}from'https://esm.sh/@gi-nx/iframe-sdk@latest';
import*as turf from'https://esm.sh/@turf/turf@6.5.0';

// ══════════════════════════════════════════════════════════════
//  WFS — URL correto (copiado do index.html)
// ══════════════════════════════════════════════════════════════
const WFS_BASE='https://wfs.geosampa.prefeitura.sp.gov.br/geoserver/ows';
let _proxy='';

// ── Constantes geográficas (copiadas do index.html) ────────────
const DEG_LAT=1/111320;
const DEG_LNG=1/(111320*Math.cos(23.5*Math.PI/180));

// BBOX a partir de uma feature GeoJSON (sem turf)
function featureToBBOX(f){
  const pts=[];
  function walk(a,d){if(d===0){pts.push(a);return;}for(const x of a)walk(x,d-1);}
  const D={Point:0,LineString:1,Polygon:2,MultiPoint:1,MultiLineString:2,MultiPolygon:3};
  walk(f.geometry.coordinates,D[f.geometry.type]??2);
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for(const[x,y]of pts){if(x<minX)minX=x;if(y<minY)minY=y;if(x>maxX)maxX=x;if(y>maxY)maxY=y;}
  return{minX,minY,maxX,maxY};
}

// Expande BBOX em metros usando conversão de graus (copiado do index.html)
function expandBBOX(b,m){
  return{minX:b.minX-m*DEG_LNG,minY:b.minY-m*DEG_LAT,maxX:b.maxX+m*DEG_LNG,maxY:b.maxY+m*DEG_LAT};
}

// Mescla múltiplos polígonos em um só (copiado do index.html)
function mergeToSinglePolygon(features){
  if(!features.length) return null;
  if(features.length===1) return features[0].geometry;
  const polys=features
    .filter(f=>f.geometry&&(f.geometry.type==='Polygon'||f.geometry.type==='MultiPolygon'))
    .flatMap(f=>f.geometry.type==='Polygon'?[f.geometry.coordinates]:f.geometry.coordinates);
  if(!polys.length) return null;
  if(polys.length===1) return{type:'Polygon',coordinates:polys[0]};
  return{type:'MultiPolygon',coordinates:polys};
}

// Buffer com steps:16 para WKT suave (copiado do index.html)
function turfBufferGeom(geometry,meters){
  try{
    const fc={type:'FeatureCollection',features:[{type:'Feature',geometry,properties:{}}]};
    const buffered=turf.buffer(fc,meters/1000,{units:'kilometers',steps:16});
    if(buffered?.features?.[0]?.geometry) return buffered.features[0].geometry;
  }catch(_){}
  return geometry;
}

function buildProxiedUrl(wfsUrl){
  const b=_proxy.replace(/\/$/,'');
  return b?`${b}?url=${encodeURIComponent(wfsUrl)}`:wfsUrl;
}

function buildWFSUrl(typeId,minX,minY,maxX,maxY,max){
  return`${WFS_BASE}?${new URLSearchParams({
    service:'WFS',version:'1.1.0',request:'GetFeature',
    typeName:typeId,outputFormat:'application/json',
    maxFeatures:String(max),srsName:'EPSG:4326',
    bbox:`${minX},${minY},${maxX},${maxY},EPSG:4326`,
  })}`;
}

// fetchWFS — cópia fiel do index.html (res.text() → JSON.parse)
async function fetchWFS(typeId,minX,minY,maxX,maxY,max,ms){
  const fetchUrl=buildProxiedUrl(buildWFSUrl(typeId,minX,minY,maxX,maxY,max));
  let res;
  try{res=await fetch(fetchUrl,{signal:AbortSignal.timeout(ms||25000)});}
  catch(e){
    if(e.name==='AbortError'||e.name==='TimeoutError') throw Object.assign(new Error('Timeout'),{_kind:'timeout'});
    throw Object.assign(new Error('CORS/rede — proxy configurado?'),{_kind:'cors'});
  }
  if(!res.ok) throw Object.assign(new Error(`HTTP ${res.status}`),{_kind:'http'});
  const text=await res.text();
  let json;
  try{json=JSON.parse(text);}
  catch(_){
    if(text.trim().startsWith('<')) throw Object.assign(new Error('Sem WFS (raster ou HTML)'),{_kind:'nowfs'});
    throw Object.assign(new Error('Resposta inválida'),{_kind:'parse'});
  }
  if(json.exceptions||json.ExceptionReport) throw Object.assign(new Error('WFS exception'),{_kind:'wfsexc'});
  return json;
}

// INTERSECTS com detecção automática de coluna geométrica — cópia do index.html
const _colCache={};
function _guessCols(typeId){
  const n=typeId.replace(/^[^:]+:/,'').toLowerCase();
  const isLine=/curva|linha|logradouro|segmento|via_|calcada|cal.ada|ferr|rio_|corrego|duto|rede_|trilho|limite_|faixa/.test(n);
  const isPt=/ponto|marco|arvore|cotado|equip|poste/.test(n);
  if(isLine)  return['ge_linha',  'ge_poligono','ge_ponto'];
  if(isPt)    return['ge_ponto',  'ge_poligono','ge_linha'];
  return           ['ge_poligono','ge_linha',   'ge_ponto'];
}
async function _fetchCol(typeId,wkt,max,col,ms){
  const fetchUrl=buildProxiedUrl(`${WFS_BASE}?${new URLSearchParams({
    service:'WFS',version:'1.1.0',request:'GetFeature',
    typeName:typeId,outputFormat:'application/json',
    maxFeatures:String(max),srsName:'EPSG:4326',
    CQL_FILTER:`INTERSECTS(${col},${wkt})`,
  })}`);
  let res;
  try{res=await fetch(fetchUrl,{signal:AbortSignal.timeout(ms||20000)});}
  catch(e){
    if(e.name==='AbortError'||e.name==='TimeoutError') throw Object.assign(new Error('Timeout'),{_kind:'timeout'});
    throw Object.assign(new Error('CORS'),{_kind:'cors'});
  }
  if(!res.ok) throw Object.assign(new Error(`HTTP ${res.status}`),{_kind:'http'});
  const text=await res.text();
  let json;
  try{json=JSON.parse(text);}
  catch(_){
    if(text.trim().startsWith('<')) throw Object.assign(new Error('coluna inválida'),{_kind:'wfsexc'});
    throw Object.assign(new Error('parse error'),{_kind:'parse'});
  }
  if(json.exceptions||json.ExceptionReport) throw Object.assign(new Error('coluna inválida'),{_kind:'wfsexc'});
  return json;
}
async function fetchByGeom(typeId,wkt,max,ms){
  if(_colCache[typeId]) return _fetchCol(typeId,wkt,max,_colCache[typeId],ms);
  for(const col of _guessCols(typeId)){
    try{const r=await _fetchCol(typeId,wkt,max,col,ms);_colCache[typeId]=col;return r;}
    catch(e){if(e._kind==='wfsexc') continue; throw e;}
  }
  throw Object.assign(new Error('Sem dados WFS'),{_kind:'nowfs'});
}

// ══════════════════════════════════════════════════════════════
//  UTM Zone 23S — cópia fiel do index.html
// ══════════════════════════════════════════════════════════════
function ll2utm(lng,lat){
  const a=6378137,f=1/298.257223563,b=a*(1-f),e2=(a*a-b*b)/(a*a),ep2=e2/(1-e2),k0=0.9996;
  const lon0=-45*Math.PI/180,latR=lat*Math.PI/180,lonR=lng*Math.PI/180;
  const N=a/Math.sqrt(1-e2*Math.sin(latR)**2),T=Math.tan(latR)**2,C=ep2*Math.cos(latR)**2;
  const A=Math.cos(latR)*(lonR-lon0);
  const M=a*((1-e2/4-3*e2**2/64-5*e2**3/256)*latR-(3*e2/8+3*e2**2/32+45*e2**3/1024)*Math.sin(2*latR)
    +(15*e2**2/256+45*e2**3/1024)*Math.sin(4*latR)-(35*e2**3/3072)*Math.sin(6*latR));
  let x=k0*N*(A+(1-T+C)*A**3/6+(5-18*T+T**2+72*C-58*ep2)*A**5/120)+500000;
  let y=k0*(M+N*Math.tan(latR)*(A**2/2+(5-T+9*C+4*C**2)*A**4/24+(61-58*T+T**2+600*C-330*ep2)*A**6/720));
  if(lat<0) y+=10000000;
  return[Math.round(x*100)/100,Math.round(y*100)/100];
}
function geojsonToWKT(geometry){
  const pt=([g,l])=>{const[x,y]=ll2utm(g,l);return`${x} ${y}`;};
  if(geometry.type==='Polygon') return`SRID=31983;POLYGON((${geometry.coordinates[0].map(pt).join(',')}))`;
  if(geometry.type==='MultiPolygon') return`SRID=31983;MULTIPOLYGON(${geometry.coordinates.map(p=>`((${p[0].map(pt).join(',')}))`).join(',')})`;
  return null;
}

// ══════════════════════════════════════════════════════════════
//  Camadas alvo
// ══════════════════════════════════════════════════════════════
const LAYERS=[
  {id:'ci',  lb:'Curva Intermediária',    tn:'geoportal:curva_intermediaria',   col:'#34d399'},
  {id:'cis', lb:'Curva Intermediária -S', tn:'geoportal:curva_intermediaria_s', col:'#6ee7b7'},
  {id:'cm',  lb:'Curva Mestra',           tn:'geoportal:curva_mestra',          col:'#fb923c'},
  {id:'cms', lb:'Curva Mestra -S',        tn:'geoportal:curva_mestra_s',        col:'#fcd34d'},
];
const PHASES=['idle','sel','r_scan','scan','r_gen','fetch','tin','r_patch','patch','done'];

// ══════════════════════════════════════════════════════════════
//  Processar FeatureCollections das curvas
// ══════════════════════════════════════════════════════════════

// Amostra pontos {lng,lat,elev} das curvas para o TIN
function samplePoints(fcs,maxPtsPerLine=20){
  const pts=[];
  for(const fc of fcs){
    for(const f of(fc?.features||[])){
      const elev=parseFloat(f.properties?.cd_numero_isovalor);
      if(isNaN(elev)) continue;
      const g=f.geometry;
      const lines=g.type==='LineString'?[g.coordinates]:g.type==='MultiLineString'?g.coordinates:[];
      for(const ln of lines){
        const step=Math.max(1,Math.floor(ln.length/maxPtsPerLine));
        for(let i=0;i<ln.length;i+=step) pts.push({lng:ln[i][0],lat:ln[i][1],elev});
        const last=ln[ln.length-1];if(last) pts.push({lng:last[0],lat:last[1],elev});
      }
    }
  }
  return pts;
}

// Transforma FCs para GeoJSON 3D (coordenadas [lng,lat,relH]) para layer de curvas
function make3DContourFC(fcs,datum){
  const features=[];
  for(const fc of fcs){
    for(const f of(fc?.features||[])){
      const elev=parseFloat(f.properties?.cd_numero_isovalor);
      if(isNaN(elev)) continue;
      const relH=Math.max(0,elev-datum);
      const add3D=coords=>coords.map(pt=>[pt[0],pt[1],relH]);
      const g=f.geometry;
      let geom3d;
      if(g.type==='LineString') geom3d={type:'LineString',coordinates:add3D(g.coordinates)};
      else if(g.type==='MultiLineString') geom3d={type:'MultiLineString',coordinates:g.coordinates.map(add3D)};
      else continue;
      features.push({type:'Feature',properties:{
        cd_numero_isovalor:f.properties?.cd_numero_isovalor,
        baseHeight:relH,   // posição 3D (nativo Giraffe)
        _baseHeight:relH,  // formato interno Giraffe
        height:0,          // sem extrusão adicional
      },geometry:geom3d});
    }
  }
  return{type:'FeatureCollection',features};
}

// ══════════════════════════════════════════════════════════════
//  TIN via Delaunator
// ══════════════════════════════════════════════════════════════
async function buildTIN(pts,datum){
  const{default:Delaunator}=await import('https://esm.sh/delaunator@5.0.0');
  if(pts.length<4) throw new Error(`Pontos insuficientes para TIN: ${pts.length}`);
  // Diagnóstico dos valores de elevação
  const elevs=pts.map(p=>p.elev);
  const eMin=Math.min(...elevs),eMax=Math.max(...elevs);
  const uniq=new Set(elevs.map(e=>Math.round(e)));
  console.log(`[TIN] ${pts.length} pts | elev ${eMin}–${eMax}m | ${uniq.size} cotas distintas`);

  const SNAP=5e-6;
  const seen=new Map(),cl=[];
  for(const p of pts){
    const k=`${p.lng/SNAP|0},${p.lat/SNAP|0}`;
    if(!seen.has(k)){seen.set(k,true);cl.push(p);}
  }
  if(cl.length<4) throw new Error('Pontos deduplicados insuficientes');
  const d=new Delaunator(cl.flatMap(p=>[p.lng,p.lat]));
  // Limiar adaptativo de aresta
  const samp=[];
  for(let i=0;i<Math.min(d.triangles.length,1200);i+=3){
    const A=cl[d.triangles[i]],B=cl[d.triangles[i+1]];
    samp.push(Math.hypot(A.lng-B.lng,A.lat-B.lat));
  }
  samp.sort((a,b)=>a-b);
  const maxEdge=Math.max((samp[samp.length>>1]||0.001)*7,3e-4);
  const feats=[];
  for(let i=0;i<d.triangles.length;i+=3){
    const A=cl[d.triangles[i]],B=cl[d.triangles[i+1]],C=cl[d.triangles[i+2]];
    if(Math.max(
      Math.hypot(A.lng-B.lng,A.lat-B.lat),
      Math.hypot(B.lng-C.lng,B.lat-C.lat),
      Math.hypot(C.lng-A.lng,C.lat-A.lat)
    )>maxEdge) continue;
    // Alturas relativas (relH = metros acima do ponto mais baixo da área)
    const ha=Math.max(0,A.elev-datum);
    const hb=Math.max(0,B.elev-datum);
    const hc=Math.max(0,C.elev-datum);
    feats.push({
      type:'Feature',
      properties:{avgH:(ha+hb+hc)/3,ha,hb,hc},
      // ALTURA CODIFICADA NA COORDENADA Z: [lng, lat, height]
      // Z viaja com o vértice, imune a reordenações internas do Giraffe
      geometry:{type:'Polygon',
        coordinates:[[[A.lng,A.lat,ha],[B.lng,B.lat,hb],[C.lng,C.lat,hc],[A.lng,A.lat,ha]]]}
    });
  }
  return{type:'FeatureCollection',features:feats};
}

// ══════════════════════════════════════════════════════════════
//  Layer IDs / nomes
// ══════════════════════════════════════════════════════════════
const PREVIEW_ID='kv-terrain-preview';
const CURVAS_TEMP_ID='kv-curvas-3d';
const CURVAS_PERM_NAME='Curvas de Nível · GeoSampa';

// ══════════════════════════════════════════════════════════════
//  Separação por Uso do Solo — "Drape" sobre TIN existente
//
//  Fluxo:
//   1. Baixar Quadras e Calçadas do GeoSampa
//   2. Criar 3 polígonos 2D limpos: intersect/difference com o buffer
//   3. Para cada polígono 2D, injetar Z em todos os vértices usando
//      o TIN já gerado como superfície de referência (getZFromTIN)
//   4. Triangular os polígonos 3D resultantes com Delaunator
//      + filtro de centróide para excluir triângulos fora do polígono
//
//  Não há clipping 3D, não há re-geração de TIN por sub-área,
//  não há sobreposição — os 3 polígonos 2D são mutuamente exclusivos.
// ══════════════════════════════════════════════════════════════

const QUADRA_LAYER  = 'geoportal:quadra_viaria_editada';
const CALCADA_LAYER = 'geoportal:calcada';
const SPLIT_IDS    = {Quadra:'kv-split-quadra', Calçada:'kv-split-calcada', Rua:'kv-split-rua'};
const SPLIT_COLORS = {Quadra:'#c87137', Calçada:'#7a8fa6', Rua:'#3a3a3a'};

// ── Interpolação Z baricêntrica do TIN ────────────────────────
// Localiza o triângulo do TIN que contém (lng,lat) em 2D e retorna
// a altura relativa Z interpolada pelos pesos baricêntricos.
// Fallback: quando o ponto está fora da cobertura do TIN (ex.: vértices
// do buffer perimetral), usa o vértice TIN mais próximo → evita Z=0.
function getZFromTIN(lng,lat,tinFeatures){
  // Tentativa 1: interpolação baricêntrica exata
  for(const tri of tinFeatures){
    const ring=tri.geometry.coordinates[0];
    const[ax,ay,az=0]=ring[0],[bx,by,bz=0]=ring[1],[cx,cy,cz=0]=ring[2];
    const det=(by-cy)*(ax-cx)+(cx-bx)*(ay-cy);
    if(Math.abs(det)<1e-14) continue;
    const w1=((by-cy)*(lng-cx)+(cx-bx)*(lat-cy))/det;
    const w2=((cy-ay)*(lng-cx)+(ax-cx)*(lat-cy))/det;
    const w3=1-w1-w2;
    if(w1>=-1e-3&&w2>=-1e-3&&w3>=-1e-3)
      return Math.max(0,w1*az+w2*bz+w3*cz);
  }
  // Fallback: vértice TIN mais próximo (pontos no perímetro do buffer
  // podem cair fora dos triângulos — sem isso ficam com Z=0)
  let bestZ=0,bestD=Infinity;
  for(const tri of tinFeatures){
    for(const v of tri.geometry.coordinates[0].slice(0,3)){
      const d=Math.hypot(lng-v[0],lat-v[1]);
      if(d<bestD){bestD=d;bestZ=v[2]||0;}
    }
  }
  return bestZ;
}

// ── Adensamento de anel ───────────────────────────────────────
// Insere vértices intermediários a cada stepDeg graus.
// ~5m = 5/111320 ≈ 4.5e-5 graus em SP.
function densifyRing(ring,stepDeg){
  if(!ring||ring.length<3) return ring;
  const out=[];
  for(let i=0;i<ring.length-1;i++){
    const p1=ring[i],p2=ring[i+1];
    out.push(p1);
    const d=Math.hypot(p2[0]-p1[0],p2[1]-p1[1]);
    if(d>stepDeg){
      const n=Math.ceil(d/stepDeg);
      for(let j=1;j<n;j++){
        const t=j/n;
        out.push([p1[0]+t*(p2[0]-p1[0]),p1[1]+t*(p2[1]-p1[1])]);
      }
    }
  }
  out.push(out[0]);
  return out;
}

// ── Drape + Triangulação de um polígono 2D ────────────────────
// Combina dois conjuntos de pontos para o Delaunator:
//   A) Vértices do polígono (anel externo adensado + buracos)
//      → Z interpolado pelo TIN com strictZ (SEM fallback de vértice próximo)
//      → Pontos fora da cobertura do TIN são DESCARTADOS (não adicionados)
//      → Isso evita o bug de "triângulo voando": o fallback retornava o Z
//        do vértice TIN mais próximo, que pode estar em cota completamente
//        diferente da real naquele ponto do perímetro do buffer.
//   B) Pontos de curvas de nível dentro do polígono
//      → Z exato (cp.elev − datum), fonte de verdade do terreno
// O polígono 2D (com buracos) filtra os triângulos pelo centróide.
function drapeFeature(feat,tinFeatures,usage,stepDeg,Delaunator,contourPtsRel=[]){
  if(!feat?.geometry) return[];
  const polys=feat.geometry.type==='Polygon'?[feat.geometry.coordinates]
    :feat.geometry.type==='MultiPolygon'?feat.geometry.coordinates:[];
  const out=[];

  for(const polyCoords of polys){
    if(!polyCoords.length||!polyCoords[0]||polyCoords[0].length<4) continue;

    // Interpolação ESTRITA — retorna null se fora do TIN (sem fallback)
    // Usada para os vértices do polígono: descarta se fora da cobertura
    const strictZ=(lng,lat)=>{
      for(const tri of tinFeatures){
        const r=tri.geometry.coordinates[0];
        const[ax,ay,az=0]=r[0],[bx,by,bz=0]=r[1],[cx,cy,cz=0]=r[2];
        const det=(by-cy)*(ax-cx)+(cx-bx)*(ay-cy);
        if(Math.abs(det)<1e-14) continue;
        const w1=((by-cy)*(lng-cx)+(cx-bx)*(lat-cy))/det;
        const w2=((cy-ay)*(lng-cx)+(ax-cx)*(lat-cy))/det;
        const w3=1-w1-w2;
        if(w1>=-1e-3&&w2>=-1e-3&&w3>=-1e-3)
          return Math.max(0,w1*az+w2*bz+w3*cz);
      }
      return null; // fora do TIN — NÃO usar fallback aqui
    };

    const SNAP=5e-7;
    const seenP=new Map();
    const pts=[];
    const addPt=(lng,lat,z)=>{
      const k=`${lng/SNAP|0},${lat/SNAP|0}`;
      if(seenP.has(k)) return;
      seenP.set(k,true);
      pts.push([lng,lat,Math.max(0,z)]);
    };

    // Polígono 2D (com buracos) — criado primeiro para filtrar pontos de curva
    const poly2D={type:'Feature',geometry:{type:'Polygon',
      coordinates:polyCoords.map(r=>r.map(p=>[p[0],p[1]]))}};

    // A) Anel externo adensado — apenas se strictZ não for null
    for(const[lng,lat] of densifyRing(polyCoords[0],stepDeg).slice(0,-1)){
      const z=strictZ(lng,lat);
      if(z!==null) addPt(lng,lat,z);
    }

    // A) Anéis internos (buracos) — apenas se strictZ não for null
    for(let ri=1;ri<polyCoords.length;ri++)
      for(const[lng,lat] of polyCoords[ri]){
        const z=strictZ(lng,lat);
        if(z!==null) addPt(lng,lat,z);
      }

    // B) Pontos de curvas de nível dentro do polígono — Z exato, sempre confiável
    for(const cp of contourPtsRel){
      try{
        if(turf.booleanPointInPolygon(turf.point([cp.lng,cp.lat]),poly2D))
          addPt(cp.lng,cp.lat,cp.z);
      }catch(_){}
    }

    if(pts.length<3) continue;

    // Triangulação Delaunay (opera em 2D — Z não afeta a topologia)
    const d=new Delaunator(pts.flatMap(p=>[p[0],p[1]]));

    for(let i=0;i<d.triangles.length;i+=3){
      const A=pts[d.triangles[i]],B=pts[d.triangles[i+1]],C=pts[d.triangles[i+2]];
      const area=(B[0]-A[0])*(C[1]-A[1])-(C[0]-A[0])*(B[1]-A[1]);
      if(Math.abs(area)<1e-14) continue;
      const cx=(A[0]+B[0]+C[0])/3,cy=(A[1]+B[1]+C[1])/3;
      try{if(!turf.booleanPointInPolygon(turf.point([cx,cy]),poly2D)) continue;}
      catch(_){continue;}
      const ha=A[2],hb=B[2],hc=C[2];
      out.push({type:'Feature',
        properties:{avgH:(ha+hb+hc)/3,ha,hb,hc},
        geometry:{type:'Polygon',
          coordinates:[[[A[0],A[1],ha],[B[0],B[1],hb],[C[0],C[1],hc],[A[0],A[1],ha]]]}});
    }
  }
  return out;
}

// ══════════════════════════════════════════════════════════════
//  App
// ══════════════════════════════════════════════════════════════
function App(){
  const[proxy,setProxy]=useState(()=>{const v=localStorage.getItem('geosampa_proxy')||'';_proxy=v;return v;});
  const[buf,setBuf]=useState(75);
  const[res,setRes]=useState(2); // 1=Normal 2=Alta 3=Máxima
  const[geo,setGeo]=useState(null);   // {geom, bbox:[x0,y0,x1,y1], wkt}
  const[scan,setScan]=useState({});   // {id:'found'|'empty'|'err'}
  const[fcs,setFcs]=useState(null);   // FeatureCollections das curvas fetched
  const[tin,setTin]=useState(null);
  const[stats,setStats]=useState(null);
  const[exag,setExag]=useState(3);    // exageração vertical do preview — mantido no state mas não exposto na UI
  const[phase,setPhase]=useState('idle');
  const[pct,setPct]=useState(0);
  const[logs,setLogs]=useState([]);
  const logEl=useRef(null);
  const[splitFcs,setSplitFcs]=useState(null);
  const[splitVis,setSplitVis]=useState({Quadra:true,Calçada:true,Rua:true});
  const[splitBusy,setSplitBusy]=useState(false);

  const sp=v=>{setProxy(v);_proxy=v;localStorage.setItem('geosampa_proxy',v);};
  const lg=(t,m)=>{
    const ts=new Date().toLocaleTimeString('pt-BR',{hour12:false});
    setLogs(p=>[...p,{t,m,ts}].slice(-500));
  };
  useEffect(()=>{if(logEl.current)logEl.current.scrollTop=logEl.current.scrollHeight;},[logs]);

  const phI=p=>PHASES.indexOf(p);
  const busy=['sel','scan','fetch','tin','patch'].includes(phase);

  function bdg(phases){
    const cur=phI(phase);
    if(phases.some(p=>p===phase)) return'bdg b-act';
    if(phases.every(p=>cur>phI(p))) return'bdg b-done';
    return'bdg b-idle';
  }

  // ─── 1. Selecionar ──────────────────────────────────────────
  const doSel=async()=>{
    if(!proxy.trim()){lg('err','Configure o proxy primeiro.');return;}
    setPhase('sel');
    lg('info','Clique em um polígono no mapa...');
    try{
      const ss=await rpc.invoke('pickRawSections',[]);
      if(!ss?.length) throw new Error('Nenhum elemento clicado');
      const poly=ss.find(s=>['Polygon','MultiPolygon'].includes(s.geometry?.type));
      if(!poly) throw new Error('O elemento clicado não é um polígono');
      // Log do primeiro vértice do polígono para confirmar que é o elemento correto
      const firstCoord=poly.geometry.coordinates?.[0]?.[0];
      if(firstCoord) lg('info',`Polígono[0]: lng=${firstCoord[0]?.toFixed(6)} lat=${firstCoord[1]?.toFixed(6)}`);
      // Buffer simples — mesmo padrão que funcionava em V22/V23
      const bfrd=turf.buffer(
        {type:'Feature',geometry:poly.geometry,properties:{}},
        buf,
        {units:'meters'}
      );
      const bfrdGeom=bfrd?.geometry||poly.geometry;
      const[x0,y0,x1,y1]=turf.bbox({type:'Feature',geometry:bfrdGeom,properties:{}});
      const wkt=geojsonToWKT(bfrdGeom);
      // Log diagnóstico — confirma que bbox está sobre o polígono clicado
      lg('info',`Bbox: lng [${x0.toFixed(5)} → ${x1.toFixed(5)}] lat [${y0.toFixed(5)} → ${y1.toFixed(5)}]`);
      lg('info',`WKT gerado: ${wkt?wkt.slice(0,60)+'…':'FALHOU — usando bbox'}`);
      setGeo({geom:poly.geometry,bbox:[x0,y0,x1,y1],wkt});
      setScan({});setFcs(null);setTin(null);setStats(null);
      setPhase('r_scan');
      lg('ok',`Polígono capturado. Buffer ${buf} m aplicado.`);
    }catch(e){lg('err',e.message);setPhase('idle');}
  };

  // ─── 2. Escanear ────────────────────────────────────────────
  const doScan=async()=>{
    if(!geo||busy) return;
    // NÃO limpa fcs/tin/stats aqui — só atualiza scan status
    // fcs e tin só são limpos em doSel (nova seleção de terreno)
    setPhase('scan');setScan({});setPct(0);
    lg('info','Escaneando camadas de curva de nível...');
    const ns={};
    for(let i=0;i<LAYERS.length;i++){
      const L=LAYERS[i];
      lg('info',`Verificando ${L.lb}...`);
      try{
        // Tenta INTERSECTS (fetchByGeom, com detecção de coluna) — mais preciso
        // Se falhar por qualquer motivo, cai no BBOX puro como fallback
        let fc;
        try{
          fc=geo.wkt?await fetchByGeom(L.tn,geo.wkt,1,12000):null;
        }catch(_){fc=null;}
        if(!fc) fc=await fetchWFS(L.tn,...geo.bbox,1,12000);
        const ok=(fc?.features?.length??0)>0;
        ns[L.id]=ok?'found':'empty';
        lg(ok?'ok':'warn',`${L.lb}: ${ok?'✓':'∅ sem dados'}`);
      }catch(e){
        ns[L.id]='err';
        lg('warn',`${L.lb}: ${e.message.slice(0,60)}`);
      }
      setPct(Math.round((i+1)/LAYERS.length*100));
    }
    setScan(ns);
    const found=Object.values(ns).filter(v=>v==='found').length;
    if(!found){lg('err','Nenhuma camada com dados. Tente buffer maior.');setPhase('r_scan');}
    else{lg('ok',`${found} camada(s) com dados.`);setPhase('r_gen');}
  };

  // ─── 3. Buscar dados (usado por Calcular e Download) ─────────
  const doFetch=async(maxF=3000)=>{
    const fnd=LAYERS.filter(L=>scan[L.id]==='found');
    if(!fnd.length) throw new Error('Nenhuma camada com dados para buscar');
    const result=[];
    for(let i=0;i<fnd.length;i++){
      const L=fnd[i];
      lg('info',`Baixando ${L.lb}...`);
      const fc=geo.wkt?await fetchByGeom(L.tn,geo.wkt,maxF,50000):await fetchWFS(L.tn,...geo.bbox,maxF,50000);
      const n=fc?.features?.length??0;
      lg('ok',`${L.lb}: ${n} feições`);
      if(n>0){
        // Diagnóstico: verificar campo cd_numero_isovalor nas primeiras feições
        const sample=fc.features.slice(0,3);
        sample.forEach((f,idx)=>{
          const v=f.properties?.cd_numero_isovalor;
          lg('info',`  feat${idx}: cd_numero_isovalor=${v===undefined?'AUSENTE':v}`);
        });
        result.push(fc);
      }
      setPct(Math.round((i+1)/fnd.length*60));
    }
    return result;
  };

  // ─── 3a. Calcular TIN + Preview ─────────────────────────────
  const doCalc=async()=>{
    if(!geo||!Object.values(scan).some(v=>v==='found')||busy) return;
    setPhase('fetch');setPct(0);setStats(null);setTin(null);
    lg('info','━━ Calculando perfil de terreno ━━');
    try{
      const loadedFcs=await doFetch(3000);
      setFcs(loadedFcs);
      setPhase('tin');
      lg('info','Extraindo pontos de elevação (cd_numero_isovalor)...');
      // Normal=20 | Alta=80 | Máxima=500 pts por segmento de curva
      const ptsPerLine=res===1?20:res===2?80:500;
      lg('info',`Resolução: ${['','Normal','Alta','Máxima'][res]} — até ${ptsPerLine} pts/curva`);
      const ptsAll=samplePoints(loadedFcs,ptsPerLine);
      if(ptsAll.length<8) throw new Error(
        `Apenas ${ptsAll.length} pontos com cd_numero_isovalor. `
        +'Verifique se o campo existe nas feições acima.');

      // ── Clipar pontos ao polígono bufferizado ────────────────────
      // As curvas de nível são linhas longas — sem clip, o TIN cobre
      // muito além da área selecionada criando uma "forma aleatória"
      const bufferFeature=turf.buffer(
        {type:'Feature',geometry:geo.geom,properties:{}},
        buf,{units:'meters'}
      );
      const pts=ptsAll.filter(p=>
        turf.booleanPointInPolygon([p.lng,p.lat],bufferFeature)
      );
      lg('info',`Clip ao buffer ${buf}m: ${ptsAll.length} → ${pts.length} pts dentro da área`);
      if(pts.length<8) throw new Error(
        `Apenas ${pts.length} pontos dentro do buffer. Tente aumentar o buffer.`);

      const elevs=pts.map(p=>p.elev);
      const eMin=Math.min(...elevs),eMax=Math.max(...elevs);
      const datum=eMin;
      lg('ok',`${pts.length} pts | ${eMin}→${eMax} m s.n.m. | datum=${datum} m | desnível=${eMax-eMin} m`);
      if(eMax-eMin<0.1) lg('warn','⚠ Desnível muito pequeno — área possivelmente plana ou campo cd_numero_isovalor igual em todas as curvas');
      setPct(70);
      lg('info','Triangulando TIN (Delaunay)...');
      const tinResult=await buildTIN(pts,datum);
      if(!tinResult.features.length) throw new Error('Nenhum triângulo válido');
      setTin(tinResult);
      lg('ok',`TIN: ${tinResult.features.length} triângulos | ha/hb/hc calculados por vértice`);
      // Preview com exageração
      await _renderPreview(tinResult,eMax-eMin);
      setPct(100);
      setStats({eMin,eMax,dnivel:eMax-eMin,datum,ntri:tinResult.features.length,npts:pts.length});
      lg('ok','Preview visível. Use os botões abaixo para exportar ou fixar patches.');
      setPhase('r_patch');
    }catch(e){
      lg('err',`Erro: ${e.message}`);
      setPhase('r_gen');setPct(0);
    }
  };

  // Preview fill-extrusion com alturas reais (sem exageração)
  const _renderPreview=async(tinResult,dnivel)=>{
    const maxH=dnivel||1;
    const cex=['interpolate',['linear'],['get','avgH'],
      0,'#1a3a28',maxH*.15,'#1d6347',maxH*.35,'#25a265',
      maxH*.55,'#6ec97e',maxH*.75,'#c8e6a0',maxH,'#f0ede2'];
    try{await rpc.invoke('removeTempLayer',[PREVIEW_ID]);}catch(_){}
    await rpc.invoke('addTempLayerGeoJSON',[
      PREVIEW_ID,tinResult,
      {type:'fill-extrusion',paint:{
        'fill-extrusion-color':cex,
        'fill-extrusion-height':['get','avgH'],
        'fill-extrusion-base':0,'fill-extrusion-opacity':0.9,
      }}
    ]);
  };

  // ─── Download curvas como layer ─────────────────────────────
  const doImport=async(mode)=>{
    if(!fcs||busy) return;
    if(!stats) return;
    const {datum,dnivel}=stats;
    lg('info',`Importando curvas — modo ${mode==='temp'?'temporário 3D':mode==='draw'?'camada de desenho':'permanente'}...`);
    try{
      if(mode==='temp'){
        // 3D: coordenadas [lng,lat,relH] + line style
        const fc3d=make3DContourFC(fcs,datum);
        const maxH=dnivel||1;
        const cex=['interpolate',['linear'],['get','baseHeight'],
          0,'#34d399',maxH*.4,'#fb923c',maxH,'#fcd34d'];
        try{await rpc.invoke('removeTempLayer',[CURVAS_TEMP_ID]);}catch(_){}
        await rpc.invoke('addTempLayerGeoJSON',[
          CURVAS_TEMP_ID,fc3d,
          {type:'line',paint:{'line-color':cex,'line-width':1.5,'line-opacity':0.9}}
        ]);
        lg('ok',`Curvas 3D adicionadas como layer temporário (${fc3d.features.length} feições)`);
      } else if(mode==='draw'){
        // Camada de desenho: createRawSections com _baseHeight por cota
        // Mesmo padrão do GeoSampa import (modo editável) + altura 3D
        const drawFeats=fcs.flatMap(fc=>(fc.features||[]).map(f=>{
          const elev=parseFloat(f.properties?.cd_numero_isovalor);
          const relH=isNaN(elev)?0:Math.max(0,elev-datum);
          return{
            type:'Feature',
            geometry:f.geometry,
            properties:{
              ...f.properties,
              id:undefined,
              _source:'GeoSampa',
              _layer:'Curvas de Nível',
              _baseHeight:relH,
              baseHeight:relH,
              height:0,
            }
          };
        }));
        lg('info',`Criando ${drawFeats.length} curvas como raw sections (baseHeight por cota)...`);
        const r=await rpc.invoke('createRawSections',[drawFeats]);
        const n=Array.isArray(r)?r.length:drawFeats.length;
        lg('ok',`✓ ${n} curvas criadas no layer de desenho ativo (baseHeight por elevação)`);
      } else {
        // Permanente: importRawSections → cria raw sections editáveis no layer ativo
        // baseHeight posiciona cada curva na sua cota relativa ao datum
        const rawSections=fcs.flatMap(fc=>(fc.features||[]).map(f=>{
          const elev=parseFloat(f.properties?.cd_numero_isovalor);
          const relH=isNaN(elev)?0:Math.max(0,elev-datum);
          return{
            type:'Feature',
            geometry:f.geometry,
            properties:{
              cd_numero_isovalor:f.properties?.cd_numero_isovalor,
              _baseHeight:relH,
              baseHeight:relH,
              height:0,
            }
          };
        }));
        lg('info',`Importando ${rawSections.length} curvas como raw sections (baseHeight por cota)...`);
        const r=await rpc.invoke('importRawSections',[rawSections]);
        const n=Array.isArray(r)?r.length:rawSections.length;
        lg('ok',`✓ ${n} curvas importadas no layer ativo (baseHeight por elevação)`);
      }
    }catch(e){
      lg('err',`Importação ${mode}: ${e.message}`);
    }
  };

  // ─── Fixar: exportar cada categoria como layer GeoJSON nomeado ──
  // Usa updateGeoJSONLayerContents — wrapper oficial que cria ou atualiza
  // a layer automaticamente sem depender de "layer ativo" no Giraffe.
  const doFixar=async()=>{
    if(!tin||phase!=='r_patch'||busy) return;
    setPhase('patch');setPct(0);
    const cats=splitFcs?Object.entries(splitFcs):[['Terreno',tin]];
    const nCats=cats.length;
    lg('info',`━━ Exportando ${nCats} camada(s) → GeoJSON layers ━━`);
    try{
      let total=0;
      for(let ci=0;ci<nCats;ci++){
        const[cat,fc]=cats[ci];
        const p0=Math.round(ci/nCats*100),p1=Math.round((ci+1)/nCats*100);
        const pp=t=>p0+Math.round((p1-p0)*t);

        // Filtrar triângulos válidos
        const valid=fc.features.filter(f=>{
          const r=f.geometry.coordinates[0];
          if(!r||r.length<4) return false;
          const[[ax,ay],[bx,by],[cx,cy]]=r;
          return[ax,ay,bx,by,cx,cy].every(Number.isFinite)
            &&Math.abs((bx-ax)*(cy-ay)-(cx-ax)*(by-ay))>1e-12;
        });
        if(!valid.length){lg('warn',`${cat}: sem triângulos — pulando.`);continue;}
        const allH=valid.flatMap(f=>f.geometry.coordinates[0].slice(0,3).map(v=>v[2]||0));
        lg('info',`${cat}: ${valid.length} tri | Z ${Math.min(...allH).toFixed(2)}–${Math.max(...allH).toFixed(2)}m`);
        setPct(pp(.10));

        // Serializar para evitar propriedades internas não serializáveis (turf)
        const fc3D=JSON.parse(JSON.stringify({
          type:'FeatureCollection',
          features:valid
        }));
        const layerName=`Terreno · ${cat}`;
        await rpc.invoke('updateGeoJSONLayerContents',[layerName,fc3D]);
        lg('ok',`${cat}: ✓ ${valid.length} triângulos → "${layerName}"`);
        total+=valid.length;
        setPct(pp(.97));
      }
      // Remover temp layers de preview
      try{await rpc.invoke('removeTempLayer',[PREVIEW_ID]);}catch(_){}
      for(const id of Object.values(SPLIT_IDS)){
        try{await rpc.invoke('removeTempLayer',[id]);}catch(_){}
      }
      setPct(100);
      lg('ok',`✓ ${total} triângulos exportados em ${nCats} layer(s)`);
      setPhase('done');
    }catch(e){lg('err',`Erro: ${e.message}`);setPhase('r_patch');setPct(0);}
  };

  // ─── Drape das camadas urbanas sobre o TIN ──────────────────
  // Fluxo:
  //  1. Baixar Quadras + Calçadas → uniões 2D
  //  2. Calcular 3 polígonos 2D mutuamente exclusivos (intersect/diff)
  //  3. drapeFeature: injetar Z em cada vértice via getZFromTIN,
  //     triangular com Delaunator, filtrar por centróide
  //  4. Publicar 3 camadas temporárias separadas
  const doSplit=async()=>{
    if(!tin||busy||splitBusy) return;
    setSplitBusy(true);
    lg('info','━━ Drape das camadas urbanas sobre o TIN ━━');
    try{
      // 1. Fetch
      lg('info',`Buscando ${QUADRA_LAYER.split(':')[1]} e ${CALCADA_LAYER.split(':')[1]}...`);
      const[qRes,cRes]=await Promise.allSettled([
        fetchWFS(QUADRA_LAYER,...geo.bbox,500,30000),
        fetchWFS(CALCADA_LAYER,...geo.bbox,500,30000),
      ]);
      const qFeatsRaw=qRes.status==='fulfilled'?(qRes.value?.features||[]):[];
      const cFeatsRaw=cRes.status==='fulfilled'?(cRes.value?.features||[]):[];
      if(qRes.status==='rejected') lg('warn',`Quadras: ${(qRes.reason?.message||'err').slice(0,60)}`);
      if(cRes.status==='rejected') lg('warn',`Calçadas: ${(cRes.reason?.message||'err').slice(0,60)}`);
      lg('ok',`Quadras: ${qFeatsRaw.length} · Calçadas: ${cFeatsRaw.length}`);

      // 2. Polígono mãe = buffer do terreno selecionado
      const mae=turf.buffer(
        {type:'Feature',geometry:geo.geom,properties:{}},buf,{units:'meters'}
      );

      // 3. Uniões das camadas
      const buildUnion=feats=>{
        const polys=feats.filter(f=>f?.geometry&&
          ['Polygon','MultiPolygon'].includes(f.geometry.type));
        if(!polys.length) return null;
        let r=polys[0];
        for(let i=1;i<polys.length;i++){try{r=turf.union(r,polys[i]);}catch(_){}}
        return r;
      };
      const qUnion=buildUnion(qFeatsRaw);
      const cUnion=buildUnion(cFeatsRaw);

      // 4. Três polígonos 2D mutuamente exclusivos
      //    quadra2D  = buffer ∩ quadras
      //    calcada2D = buffer ∩ calçadas
      //    rua2D     = buffer − quadras − calçadas
      let quadra2D=null,calcada2D=null;
      let rua2D=mae;

      // Ordem de prioridade: Calçada > Quadra > Rua
      // A calçada do GeoSampa se sobrepõe nativamente à quadra.
      // Para que as três áreas sejam mutuamente exclusivas:
      //   quadra2D  = (buffer ∩ quadras) − calçadas   ← subtrai calçada da quadra
      //   calcada2D =  buffer ∩ calçadas               ← calçada intacta
      //   rua2D     =  buffer − quadras − calçadas     ← exclusão final

      if(qUnion){
        try{
          const qRaw=turf.intersect(mae,qUnion);
          // Subtrai a calçada da quadra para eliminar sobreposição
          quadra2D=cUnion&&qRaw?.geometry
            ?turf.difference(qRaw,cUnion)||qRaw
            :qRaw;
          const df=turf.difference(rua2D,qUnion);
          if(df?.geometry) rua2D=df;
        }catch(e){lg('warn',`Quadra 2D: ${e.message.slice(0,60)}`);}
      }
      if(cUnion){
        try{
          calcada2D=turf.intersect(mae,cUnion);
          const df=turf.difference(rua2D,cUnion);
          if(df?.geometry) rua2D=df;
        }catch(e){lg('warn',`Calçada 2D: ${e.message.slice(0,60)}`);}
      }
      lg('ok',`Polígonos 2D (sem sobreposição): Quadra=${quadra2D?.geometry?.type||'∅'} · Calçada=${calcada2D?.geometry?.type||'∅'} · Rua=${rua2D?.geometry?.type||'?'}`);

      // 5. Preparar pontos das curvas com Z relativo ao datum
      //    Esses pontos têm a elevação EXATA de cada curva — são a fonte de
      //    verdade do terreno. Ao passá-los para drapeFeature, o interior de
      //    cada polígono triangula com o relevo real, não apenas interpolação
      //    linear entre os vértices do polígono.
      const datum=stats.datum;
      const ptsPerLine=res===1?20:res===2?80:500;
      const rawCPts=samplePoints(fcs,ptsPerLine);
      const contourPtsRel=rawCPts
        .filter(p=>{try{return turf.booleanPointInPolygon([p.lng,p.lat],mae);}catch(_){return false;}})
        .map(p=>({lng:p.lng,lat:p.lat,z:Math.max(0,p.elev-datum)}));
      lg('ok',`${contourPtsRel.length} pontos de curva (resolução ${['','Normal','Alta','Máxima'][res]}) incluídos na triangulação`);

      // 6. Importar Delaunator e fazer drape de cada polígono
      const{default:Delaunator}=await import('https://esm.sh/delaunator@5.0.0');
      const STEP=5/111320; // ~5m em graus

      const mkFC=feats=>({type:'FeatureCollection',features:feats});

      lg('info','Injetando Z e triangulando Quadra...');
      const qF=quadra2D?drapeFeature(quadra2D,tin.features,'Quadra',STEP,Delaunator,contourPtsRel):[];
      lg('ok',`Quadra: ${qF.length} triângulos`);

      lg('info','Injetando Z e triangulando Calçada...');
      const cF=calcada2D?drapeFeature(calcada2D,tin.features,'Calçada',STEP,Delaunator,contourPtsRel):[];
      lg('ok',`Calçada: ${cF.length} triângulos`);

      lg('info','Injetando Z e triangulando Rua (polígono com buracos)...');
      const rF=drapeFeature(rua2D,tin.features,'Rua',STEP,Delaunator,contourPtsRel);
      lg('ok',`Rua: ${rF.length} triângulos`);

      if(!qF.length&&!cF.length&&!rF.length)
        throw new Error('Nenhum triângulo gerado — verifique as camadas');

      const result={Quadra:mkFC(qF),Calçada:mkFC(cF),Rua:mkFC(rF)};
      const counts=Object.entries(result).map(([k,v])=>`${v.features.length} ${k}`).join(' · ');
      lg('ok',`Total: ${counts}`);

      // 6. Publicar 3 camadas temporárias
      try{await rpc.invoke('removeTempLayer',[PREVIEW_ID]);}catch(_){}
      for(const[cat,fc] of Object.entries(result)){
        const id=SPLIT_IDS[cat];
        try{await rpc.invoke('removeTempLayer',[id]);}catch(_){}
        if(fc.features.length){
          await rpc.invoke('addTempLayerGeoJSON',[id,JSON.parse(JSON.stringify(fc)),{
            type:'fill-extrusion',
            paint:{
              'fill-extrusion-color':SPLIT_COLORS[cat],
              'fill-extrusion-height':['get','avgH'],
              'fill-extrusion-base':0,'fill-extrusion-opacity':0.92,
            }
          }]);
        }
      }
      setSplitFcs(result);
      setSplitVis({Quadra:true,Calçada:true,Rua:true});
      lg('ok','✓ 3 camadas publicadas. Clique nos botões para ocultar/mostrar cada uso.');
    }catch(e){
      lg('err',`Drape: ${e.message}`);
    }finally{
      setSplitBusy(false);
    }
  };

  const toggleSplitLayer=async(cat)=>{
    if(!splitFcs) return;
    const nv={...splitVis,[cat]:!splitVis[cat]};
    setSplitVis(nv);
    const id=SPLIT_IDS[cat];
    if(!nv[cat]){try{await rpc.invoke('removeTempLayer',[id]);}catch(_){}}
    else{
      const fc=splitFcs[cat];
      if(fc?.features?.length){
        try{await rpc.invoke('removeTempLayer',[id]);}catch(_){}
        await rpc.invoke('addTempLayerGeoJSON',[id,JSON.parse(JSON.stringify(fc)),{
          type:'fill-extrusion',
          paint:{
            'fill-extrusion-color':SPLIT_COLORS[cat],
            'fill-extrusion-height':['get','avgH'],
            'fill-extrusion-base':0,'fill-extrusion-opacity':0.92,
          }
        }]);
      }
    }
  };

  // ─── Limpar ─────────────────────────────────────────────────
  const doClear=async()=>{
    try{await rpc.invoke('removeTempLayer',[PREVIEW_ID]);}catch(_){}
    try{await rpc.invoke('removeTempLayer',[CURVAS_TEMP_ID]);}catch(_){}
    for(const id of Object.values(SPLIT_IDS)){
      try{await rpc.invoke('removeTempLayer',[id]);}catch(_){}
    }
    setGeo(null);setScan({});setFcs(null);setTin(null);
    setSplitFcs(null);setSplitVis({Quadra:true,Calçada:true,Rua:true});setSplitBusy(false);
    setPhase('idle');setPct(0);setStats(null);setLogs([]);
  };

  const hasGeo=!!geo;
  const hasFnd=Object.values(scan).some(v=>v==='found');
  const hasFcs=!!fcs;
  const hasTin=!!tin;
  const canScan=hasGeo&&!busy&&['r_scan','r_gen','r_patch','done'].includes(phase);
  const canGen=hasGeo&&hasFnd&&!busy&&['r_gen','r_patch','done'].includes(phase);
  const canImport=hasFcs&&!busy&&['r_patch','done'].includes(phase);
  const canPatch=hasTin&&!busy&&['r_patch','done'].includes(phase);
  const isCalc=['fetch','tin'].includes(phase);

  return h('div',{style:{display:'flex',flexDirection:'column',height:'100%',padding:'9px',gap:'6px',overflow:'hidden'}},

    // Header
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('div',null,
        h('p',{style:{fontSize:'9px',letterSpacing:'2px',color:'#252525',textTransform:'uppercase'}},'KV Arquitetos'),
        h('h1',{style:{fontSize:'13px',fontWeight:700,color:'#00ACCD'}},'Perfil de Terreno 3D'),
        h('p',{style:{fontSize:'9px',color:'#2a2a2a',marginTop:'1px',letterSpacing:'.5px'}},'beta V29')
      ),
      hasGeo&&h('button',{className:'btn btn-sm',onClick:doClear,disabled:busy},'✕ limpar')
    ),

    // Config
    h('div',{className:'card'},
      h('div',{style:{display:'flex',gap:'5px',alignItems:'center',marginBottom:'6px'}},
        h('span',{style:{fontSize:'10px',color:'#333',width:'36px',flexShrink:0}},'Proxy'),
        h('input',{className:'fld',style:{flex:1},placeholder:'https://…workers.dev',value:proxy,onChange:e=>sp(e.target.value)})
      ),
      h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
        h('span',{style:{fontSize:'10px',color:'#333',width:'36px',flexShrink:0}},'Buffer'),
        h('input',{type:'range',min:25,max:500,step:25,value:buf,
          disabled:hasGeo,onChange:e=>setBuf(Number(e.target.value))}),
        h('span',{style:{fontSize:'11px',color:'#00ACCD',fontWeight:600,minWidth:'46px',textAlign:'right'}},`${buf} m`)
      ),
      h('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},
        h('span',{style:{fontSize:'10px',color:'#333',width:'36px',flexShrink:0}},'Resolução'),
        ...[['Normal',1,'≈20 pts',' — rápido'],['Alta',2,'≈80 pts',' — recomendado'],['Máxima',3,'≈500 pts',' — lento']].map(([label,v,sub])=>
          h('button',{key:v,onClick:()=>setRes(v),disabled:busy,
            style:{
              flex:1,padding:'3px 2px',borderRadius:'3px',
              fontSize:'10px',cursor:'pointer',border:'1px solid',
              fontFamily:'Hind,sans-serif',lineHeight:1.3,
              background:res===v?'#00ACCD22':'transparent',
              color:res===v?'#00ACCD':'#555',
              borderColor:res===v?'#00ACCD':'#1a1a1a',
              fontWeight:res===v?700:400,
            }},
            h('div',null,label),
            h('div',{style:{fontSize:'8px',opacity:.7}},sub)
          )
        )
      )
    ),

    // Passo 1
    h('div',{className:'card'},
      h('div',{style:{display:'flex',alignItems:'center',gap:'7px',marginBottom:'6px'}},
        h('span',{className:bdg(['idle','sel'])},'1'),
        h('span',{style:{fontSize:'11px',fontWeight:600}},'Selecionar Terreno')
      ),
      hasGeo
        ?h('p',{style:{fontSize:'10px',color:'#4ade80'}},`✓  Polígono selecionado — buffer ${buf} m`)
        :h('button',{className:'btn btn-pri',style:{width:'100%'},onClick:doSel,disabled:busy||!proxy.trim()},
            phase==='sel'?'⏳ Aguardando clique...':'🖱 Clicar em um polígono no mapa')
    ),

    // Passo 2
    h('div',{className:'card'},
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'6px'}},
        h('div',{style:{display:'flex',alignItems:'center',gap:'7px'}},
          h('span',{className:bdg(['r_scan','scan'])},'2'),
          h('span',{style:{fontSize:'11px',fontWeight:600}},'Escanear Camadas')
        ),
        h('button',{className:'btn btn-out',style:{fontSize:'10px',padding:'3px 9px'},onClick:doScan,disabled:!canScan},
          phase==='scan'?'⏳':'⚡ Escanear')
      ),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'3px',marginBottom:phase==='scan'?'5px':'0'}},
        ...LAYERS.map(L=>{
          const s=scan[L.id];
          return h('div',{key:L.id,className:`chip ${!s?'ch-p':s==='found'?'ch-f':'ch-e'}`},
            h('span',{style:{fontSize:'9px',fontWeight:500,color:s==='found'?L.col:'#252525'}},L.lb),
            h('span',{style:{fontSize:'9px',color:'#333'}},!s?'—':s==='found'?'✓':s==='empty'?'∅':'✗')
          );
        })
      ),
      phase==='scan'&&h('div',{className:'pb'},h('div',{className:'pf',style:{width:`${pct}%`}}))
    ),

    // Passo 3 — Terreno + Download
    h('div',{className:'card',style:{flex:'1 1 auto',display:'flex',flexDirection:'column',overflow:'hidden'}},
      // Linha do título
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'6px',flexShrink:0}},
        h('div',{style:{display:'flex',alignItems:'center',gap:'7px'}},
          h('span',{className:bdg(['r_gen','fetch','tin','r_patch','patch'])},'3'),
          h('span',{style:{fontSize:'11px',fontWeight:600}},'Gerar Terreno')
        ),
        h('div',{style:{display:'flex',gap:'4px'}},
          h('button',{className:'btn btn-pri',style:{fontSize:'10px',padding:'4px 9px'},
            onClick:doCalc,disabled:!canGen},
            isCalc?'⏳ Calculando...':'▶ Calcular'),
          h('button',{className:'btn btn-grn',style:{fontSize:'10px',padding:'4px 9px'},
            title:'Criar patches 3D editáveis no projeto',
            onClick:doFixar,disabled:!canPatch},
            phase==='patch'?'⏳':'📌 Fixar Patches')
        )
      ),

      // Barra de progresso
      isCalc&&h('div',{className:'pb',style:{flexShrink:0}},h('div',{className:'pf',style:{width:`${pct}%`}})),

      // Download de curvas — aparece após ter fcs
      hasFcs&&h('div',{style:{flexShrink:0}},
        h('div',{className:'divl'}),
        h('div',{style:{display:'flex',alignItems:'center',gap:'4px',flexWrap:'wrap',marginBottom:'4px'}},
          h('span',{style:{fontSize:'10px',color:'#444',marginRight:'2px'}},'Curvas:'),
          h('button',{className:'btn btn-out',style:{fontSize:'10px',padding:'3px 8px'},
            onClick:()=>doImport('temp'),disabled:busy},'🗺 Temp 3D'),
          h('button',{className:'btn btn-out',style:{fontSize:'10px',padding:'3px 8px'},
            onClick:()=>doImport('draw'),disabled:busy},'✏️ Desenho'),
          h('button',{className:'btn btn-out',style:{fontSize:'10px',padding:'3px 8px'},
            onClick:()=>doImport('perm'),disabled:busy},'💾 Permanente')
        )
      ),

      // Estatísticas
      stats&&h('div',{className:'row2',style:{margin:'5px 0',flexShrink:0}},
        h('span',{className:'rk'},'Elev. min/max'), h('span',{className:'rv'},`${stats.eMin} / ${stats.eMax} m`),
        h('span',{className:'rk'},'Desnível'),      h('span',{className:'rv'},`${stats.dnivel} m`),
        h('span',{className:'rk'},'Datum (zero)'),  h('span',{className:'rv'},`${stats.datum} m s.n.m.`),
        h('span',{className:'rk'},'Triâng. TIN'),   h('span',{className:'rv'},stats.ntri.toLocaleString('pt-BR')),
        h('span',{className:'rk'},'Pts controle'),  h('span',{className:'rv'},stats.npts.toLocaleString('pt-BR')),
      ),

      // Uso do Solo 3D
      hasTin&&h('div',{style:{flexShrink:0}},
        h('div',{className:'divl'}),
        h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'5px'}},
          h('span',{style:{fontSize:'10px',color:'#555',fontWeight:600,letterSpacing:'.4px'}},'Uso do Solo 3D'),
          h('button',{
            className:'btn btn-out',style:{fontSize:'10px',padding:'3px 9px'},
            onClick:doSplit,disabled:!hasTin||busy||splitBusy,
          },splitBusy?'⏳ Calculando...':'✂ Separar')
        ),
        splitFcs&&h('div',{style:{display:'flex',gap:'3px'}},
          ...['Quadra','Calçada','Rua'].map(cat=>
            h('button',{key:cat,onClick:()=>toggleSplitLayer(cat),
              style:{
                flex:1,padding:'4px 3px',borderRadius:'3px',
                fontSize:'10px',fontWeight:600,cursor:'pointer',
                border:'1px solid',fontFamily:'Hind,sans-serif',transition:'all .15s',
                background:splitVis[cat]?SPLIT_COLORS[cat]+'22':'transparent',
                color:splitVis[cat]?SPLIT_COLORS[cat]:'#252525',
                borderColor:splitVis[cat]?SPLIT_COLORS[cat]:'#141414',
              }},
              h('div',{style:{fontSize:'9px',opacity:.7}},splitVis[cat]?'●':'○'),
              cat,
              h('div',{style:{fontSize:'9px',opacity:.55}},
                `${(splitFcs[cat]?.features?.length||0).toLocaleString('pt-BR')} tri`)
            )
          )
        )
      ),

      // Log
      h('div',{className:'divl',style:{flexShrink:0}}),
      h('div',{className:'lg',ref:logEl,style:{flex:1,minHeight:'40px'}},
        logs.length===0
          ?h('span',{style:{color:'#141414'}},'Pronto.')
          :logs.map((l,i)=>h('div',{key:i},
            h('span',{className:'lt'},[`[${l.ts}] `]),
            h('span',{className:`l${l.t[0]}`},l.m)
          ))
      )
    )
  );
}

createRoot(document.getElementById('root')).render(h(App,null));
</script>
</body>
</html>
